<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matches | Admin</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .logo-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        margin-bottom: 20px;
      }
      .logo-container img {
        height: 60px;
        width: auto;
        object-fit: contain;
        transition: opacity 0.3s ease;
      }
      .logo-container img.loading {
        opacity: 0.3;
      }
      .logo-container img.loaded {
        opacity: 1;
      }
      .logo-container img.error {
        display: none;
      }
      @media (max-width: 600px) {
        .logo-container {
          gap: 16px;
        }
        .logo-container img {
          height: 50px;
        }
      }
      
      .status-yes {
        color: var(--ok);
        font-weight: 700;
      }
      .status-no {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <img 
          id="emmveeLogo" 
          src="/logo/Emmvee-group-logo.jpg" 
          alt="Emmvee Logo" 
          class="loading"
        />
        <img 
          id="rcbLogo" 
          src="/logo/rcb_logo.jpg" 
          alt="RCB Logo" 
          class="loading"
        />
      </div>
      
      <div class="brand">
        <h1>Admin — Matches</h1>
        <div class="pill">Pick winners match-wise</div>
      </div>

      <div class="card">
        <div class="topbar">
          <a class="link" href="/admin/files.html">📁 Browse CSV Files</a>
          <div style="display: flex; gap: 10px;">
            <button class="btn secondary" id="refreshBtn">🔄 Refresh</button>
            <button class="btn secondary" id="logoutBtn">Logout</button>
          </div>
        </div>

        <div style="margin-top: 20px;">
          <div style="font-weight: 800; font-size: 15px;">RCB Bengaluru matches</div>
          <div class="hint">Eligible count excludes anyone who already won a ticket in any match.</div>
        </div>

        <table class="table" id="tbl" style="margin-top: 15px;">
          <thead>
            <tr>
              <th>Match</th>
              <th>Interested</th>
              <th>Eligible</th>
              <th>Winners generated</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <div id="msg"></div>
      </div>
    </div>

    <script>
      // Handle logo loading
      const emmveeLogo = document.getElementById("emmveeLogo");
      const rcbLogo = document.getElementById("rcbLogo");
      
      [emmveeLogo, rcbLogo].forEach(logo => {
        if (logo) {
          // Check if image is already loaded (cached)
          if (logo.complete && logo.naturalHeight !== 0) {
            logo.classList.remove("loading");
            logo.classList.add("loaded");
          } else {
            logo.addEventListener("load", () => {
              logo.classList.remove("loading");
              logo.classList.add("loaded");
            });
            logo.addEventListener("error", () => {
              logo.classList.remove("loading");
              logo.classList.add("error");
            });
          }
        }
      });

      const rowsEl = document.getElementById("rows");
      const msg = document.getElementById("msg");
      const refreshBtn = document.getElementById("refreshBtn");
      const logoutBtn = document.getElementById("logoutBtn");

      function setMsg(text, type) {
        msg.className = type || "";
        msg.textContent = text || "";
      }

      async function load() {
        setMsg("", "");
        refreshBtn.disabled = true;
        refreshBtn.textContent = "🔄 Loading...";
        
        try {
          const res = await fetch("/api/admin/matches");
          if (res.status === 401) {
            window.location.href = "/admin/login.html";
            return;
          }
          const data = await res.json();
          rowsEl.innerHTML = "";
          for (const m of data.matches || []) {
            const tr = document.createElement("tr");
            const statusClass = m.winnersGenerated ? "status-yes" : "status-no";
            const statusText = m.winnersGenerated ? "Yes" : "No";
            tr.innerHTML = `
              <td>
                <div style="font-weight:800">${m.title}</div>
                <div class="hint">${m.dateTime} • ${m.venue} • ${m.matchId}</div>
              </td>
              <td>${m.interestedCount}</td>
              <td>${m.eligibleCount}</td>
              <td><span class="${statusClass}">${statusText}</span></td>
              <td><a class="link" href="/admin/match.html?matchId=${encodeURIComponent(m.matchId)}">Open</a></td>
            `;
            rowsEl.appendChild(tr);
          }
          setMsg("Data refreshed successfully", "success");
          setTimeout(() => setMsg("", ""), 2000);
        } catch (err) {
          setMsg("Failed to load data", "error");
        } finally {
          refreshBtn.disabled = false;
          refreshBtn.textContent = "🔄 Refresh";
        }
      }

      async function logout() {
        await fetch("/api/logout", { method: "POST" }).catch(() => {});
        window.location.href = "/admin/login.html";
      }

      refreshBtn.addEventListener("click", load);
      logoutBtn.addEventListener("click", logout);
      load();
    </script>
  </body>
</html>
