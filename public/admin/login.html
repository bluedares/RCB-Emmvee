<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | IPL Tickets</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .logo-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        margin-bottom: 24px;
        padding: 20px 0;
      }
      .logo-container img {
        height: 70px;
        width: auto;
        object-fit: contain;
        transition: opacity 0.3s ease;
      }
      .logo-container img.loading {
        opacity: 0.3;
      }
      .logo-container img.loaded {
        opacity: 1;
      }
      .logo-container img.error {
        display: none;
      }
      @media (max-width: 600px) {
        .logo-container {
          gap: 16px;
        }
        .logo-container img {
          height: 55px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <img 
          id="emmveeLogo" 
          src="/logo/Emmvee-group-logo.jpg" 
          alt="Emmvee Logo" 
          class="loading"
        />
        <img 
          id="rcbLogo" 
          src="/logo/rcb_logo.jpg" 
          alt="RCB Logo" 
          class="loading"
        />
      </div>
      
      <div class="brand">
        <h1>Admin Console — IPL Tickets</h1>
        <div class="pill">CSV-only • Match-wise winners</div>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="admin" autocomplete="off" />
          </div>
          <div>
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="••••••••" />
            <div class="hint">Credentials are read from <code>data/admins.csv</code>.</div>
          </div>
          <button id="loginBtn" class="btn">Login</button>
          <div id="msg"></div>
        </div>
      </div>
    </div>

    <script>
      // Handle logo loading
      const emmveeLogo = document.getElementById("emmveeLogo");
      const rcbLogo = document.getElementById("rcbLogo");
      
      [emmveeLogo, rcbLogo].forEach(logo => {
        if (logo) {
          logo.addEventListener("load", () => {
            logo.classList.remove("loading");
            logo.classList.add("loaded");
          });
          logo.addEventListener("error", () => {
            logo.classList.remove("loading");
            logo.classList.add("error");
          });
        }
      });

      const usernameEl = document.getElementById("username");
      const passwordEl = document.getElementById("password");
      const btn = document.getElementById("loginBtn");
      const msg = document.getElementById("msg");

      function setMsg(text, type) {
        msg.className = type || "";
        msg.textContent = text || "";
      }

      async function login() {
        setMsg("", "");
        btn.disabled = true;
        try {
          const username = usernameEl.value.trim();
          const password = passwordEl.value.trim();
          const res = await fetch("/api/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) return setMsg(data.error || "Login failed", "error");
          window.location.href = "/admin/matches.html";
        } catch {
          setMsg("Network error. Try again.", "error");
        } finally {
          btn.disabled = false;
        }
      }

      btn.addEventListener("click", login);
      passwordEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
      });
    </script>
  </body>
</html>
