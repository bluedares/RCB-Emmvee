<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSV Files — Admin</title>
    <link rel="stylesheet" href="/admin/styles.css" />
    <style>
      .logo-container {
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
      }
      .logo-container img {
        height: 60px;
        width: auto;
        transition: opacity 0.3s ease;
      }
      .logo-container img.loading {
        opacity: 0.3;
      }
      .logo-container img.loaded {
        opacity: 1;
      }
      .logo-container img.error {
        opacity: 0.2;
      }
      .file-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        border-bottom: 1px solid var(--border);
      }
      .file-info {
        flex: 1;
      }
      .file-name {
        font-weight: 600;
        margin-bottom: 4px;
      }
      .file-meta {
        font-size: 12px;
        color: var(--hint);
      }
      .file-actions {
        display: flex;
        gap: 10px;
      }
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }
      .modal.active {
        display: flex;
      }
      .modal-content {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 30px;
        max-width: 800px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .modal-header h2 {
        margin: 0;
        font-size: 18px;
      }
      .close-btn {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: var(--hint);
        padding: 0;
        width: 30px;
        height: 30px;
      }
      .close-btn:hover {
        color: var(--text);
      }
      textarea {
        width: 100%;
        min-height: 300px;
        font-family: 'Monaco', 'Courier New', monospace;
        font-size: 13px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg);
        color: var(--text);
        resize: vertical;
      }
      .upload-area {
        border: 2px dashed var(--border);
        border-radius: 8px;
        padding: 30px;
        text-align: center;
        margin-bottom: 20px;
        cursor: pointer;
        transition: all 0.3s;
      }
      .upload-area:hover {
        border-color: var(--primary);
        background: rgba(255, 193, 7, 0.05);
      }
      .upload-area.dragover {
        border-color: var(--primary);
        background: rgba(255, 193, 7, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <img 
          id="emmveeLogo" 
          src="/logo/Emmvee-group-logo.jpg" 
          alt="Emmvee Logo" 
          class="loading"
        />
        <img 
          id="rcbLogo" 
          src="/logo/rcb_logo.jpg" 
          alt="RCB Logo" 
          class="loading"
        />
      </div>
      
      <div class="brand">
        <h1>CSV Files Browser</h1>
        <div class="pill">Admin Console</div>
      </div>

      <div class="card">
        <div class="topbar">
          <a class="link" href="/admin/matches.html">← Back to Matches</a>
          <button class="btn secondary" id="logoutBtn">Logout</button>
        </div>

        <div style="margin-top: 20px;">
          <div style="font-weight: 800; font-size: 15px; margin-bottom: 10px;">All CSV Files</div>
          <div class="hint" id="fileCount">Loading...</div>
          
          <div id="filesList" style="margin-top: 15px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;">
            <!-- Files will be loaded here -->
          </div>
          
          <div id="msg" style="margin-top: 15px;"></div>
        </div>
      </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">Edit CSV File</h2>
          <button class="close-btn" id="closeModal">&times;</button>
        </div>
        
        <div class="upload-area" id="uploadArea">
          <div style="font-size: 40px; margin-bottom: 10px;">📁</div>
          <div style="font-weight: 600; margin-bottom: 5px;">Drop CSV file here or click to browse</div>
          <div class="hint">Replace the file content by uploading a new CSV</div>
          <input type="file" id="fileInput" accept=".csv" style="display: none;" />
        </div>
        
        <div style="margin-bottom: 10px;">
          <label style="font-weight: 600;">CSV Content:</label>
          <div class="hint">Edit the CSV content directly below</div>
        </div>
        <textarea id="csvContent" placeholder="CSV content will appear here..."></textarea>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
          <button class="btn" id="saveBtn">Save Changes</button>
          <button class="btn secondary" id="cancelBtn">Cancel</button>
        </div>
        
        <div id="modalMsg" style="margin-top: 15px;"></div>
      </div>
    </div>

    <script>
      // Handle logo loading
      const emmveeLogo = document.getElementById("emmveeLogo");
      const rcbLogo = document.getElementById("rcbLogo");
      
      [emmveeLogo, rcbLogo].forEach(logo => {
        if (logo) {
          if (logo.complete && logo.naturalHeight !== 0) {
            logo.classList.remove("loading");
            logo.classList.add("loaded");
          } else {
            logo.addEventListener("load", () => {
              logo.classList.remove("loading");
              logo.classList.add("loaded");
            });
            logo.addEventListener("error", () => {
              logo.classList.remove("loading");
              logo.classList.add("error");
            });
          }
        }
      });

      const filesListEl = document.getElementById("filesList");
      const fileCountEl = document.getElementById("fileCount");
      const msg = document.getElementById("msg");
      const logoutBtn = document.getElementById("logoutBtn");

      function setMsg(text, type) {
        msg.className = type || "";
        msg.textContent = text || "";
      }

      function formatBytes(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
      }

      function formatDate(dateStr) {
        const date = new Date(dateStr);
        return date.toLocaleString();
      }

      async function loadFiles() {
        try {
          const res = await fetch("/api/admin/files");
          if (res.status === 401) {
            window.location.href = "/admin/login.html";
            return;
          }
          
          const data = await res.json();
          if (!res.ok) {
            setMsg(data.error || "Failed to load files", "error");
            return;
          }

          const files = data.files || [];
          fileCountEl.textContent = `${files.length} file(s) found`;
          
          if (files.length === 0) {
            filesListEl.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--hint);">No CSV files found</div>';
            return;
          }

          filesListEl.innerHTML = "";
          for (const file of files) {
            const row = document.createElement("div");
            row.className = "file-row";
            
            // Check if file is deletable (not core system files)
            const protectedFiles = ["employees.csv", "admins.csv", "interests.csv"];
            const isDeletable = !protectedFiles.includes(file.path);
            
            row.innerHTML = `
              <div class="file-info">
                <div class="file-name">${file.name}</div>
                <div class="file-meta">${formatBytes(file.size)} • Modified: ${formatDate(file.modified)}</div>
              </div>
              <div class="file-actions">
                <a class="link" href="#" data-action="edit" data-path="${file.path}" data-name="${file.name}">Edit</a>
                <a class="link" href="/api/admin/files/download/${encodeURIComponent(file.path)}" download>Download</a>
                ${isDeletable ? `<a class="link" href="#" data-action="delete" data-path="${file.path}" data-name="${file.name}" style="color: #ff4444;">Delete</a>` : ''}
              </div>
            `;
            filesListEl.appendChild(row);
          }
          
          // Add click handlers for edit buttons
          document.querySelectorAll('[data-action="edit"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.preventDefault();
              openEditModal(btn.dataset.path, btn.dataset.name);
            });
          });
          
          // Add click handlers for delete buttons
          document.querySelectorAll('[data-action="delete"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.preventDefault();
              deleteFile(btn.dataset.path, btn.dataset.name);
            });
          });
        } catch (err) {
          setMsg("Network error. Please try again.", "error");
        }
      }

      // Modal elements
      const editModal = document.getElementById("editModal");
      const modalTitle = document.getElementById("modalTitle");
      const csvContent = document.getElementById("csvContent");
      const closeModal = document.getElementById("closeModal");
      const cancelBtn = document.getElementById("cancelBtn");
      const saveBtn = document.getElementById("saveBtn");
      const uploadArea = document.getElementById("uploadArea");
      const fileInput = document.getElementById("fileInput");
      const modalMsg = document.getElementById("modalMsg");
      
      let currentFilePath = "";
      
      function setModalMsg(text, type) {
        modalMsg.className = type || "";
        modalMsg.textContent = text || "";
      }
      
      async function openEditModal(filePath, fileName) {
        currentFilePath = filePath;
        modalTitle.textContent = `Edit ${fileName}`;
        setModalMsg("", "");
        
        // Load file content
        try {
          const res = await fetch(`/api/admin/files/download/${encodeURIComponent(filePath)}`);
          if (res.ok) {
            const content = await res.text();
            csvContent.value = content;
          } else {
            csvContent.value = "";
            setModalMsg("Could not load file content", "error");
          }
        } catch (err) {
          csvContent.value = "";
          setModalMsg("Error loading file", "error");
        }
        
        editModal.classList.add("active");
      }
      
      function closeEditModal() {
        editModal.classList.remove("active");
        currentFilePath = "";
        csvContent.value = "";
        setModalMsg("", "");
      }
      
      async function saveFile() {
        if (!currentFilePath) return;
        
        const content = csvContent.value;
        if (!content.trim()) {
          setModalMsg("CSV content cannot be empty", "error");
          return;
        }
        
        saveBtn.disabled = true;
        setModalMsg("Saving...", "");
        
        try {
          const res = await fetch(`/api/admin/files/upload/${encodeURIComponent(currentFilePath)}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content }),
          });
          
          const data = await res.json();
          if (res.ok) {
            setModalMsg("File saved successfully!", "success");
            setTimeout(() => {
              closeEditModal();
              loadFiles();
            }, 1000);
          } else {
            setModalMsg(data.error || "Failed to save file", "error");
          }
        } catch (err) {
          setModalMsg("Network error. Please try again.", "error");
        } finally {
          saveBtn.disabled = false;
        }
      }
      
      async function deleteFile(filePath, fileName) {
        if (!confirm(`Are you sure you want to delete "${fileName}"?\n\nThis action cannot be undone.`)) {
          return;
        }
        
        setMsg("Deleting...", "");
        
        try {
          const res = await fetch(`/api/admin/files/delete/${encodeURIComponent(filePath)}`, {
            method: "DELETE",
          });
          
          const data = await res.json();
          if (res.ok) {
            setMsg("File deleted successfully!", "success");
            setTimeout(() => {
              setMsg("", "");
              loadFiles();
            }, 2000);
          } else {
            setMsg(data.error || "Failed to delete file", "error");
          }
        } catch (err) {
          setMsg("Network error. Please try again.", "error");
        }
      }
      
      // Upload area handlers
      uploadArea.addEventListener("click", () => fileInput.click());
      
      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => {
            csvContent.value = e.target.result;
            setModalMsg("File loaded. Click 'Save Changes' to upload.", "success");
          };
          reader.readAsText(file);
        }
      });
      
      uploadArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadArea.classList.add("dragover");
      });
      
      uploadArea.addEventListener("dragleave", () => {
        uploadArea.classList.remove("dragover");
      });
      
      uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadArea.classList.remove("dragover");
        
        const file = e.dataTransfer.files[0];
        if (file && file.name.endsWith(".csv")) {
          const reader = new FileReader();
          reader.onload = (e) => {
            csvContent.value = e.target.result;
            setModalMsg("File loaded. Click 'Save Changes' to upload.", "success");
          };
          reader.readAsText(file);
        } else {
          setModalMsg("Please drop a CSV file", "error");
        }
      });
      
      // Modal event listeners
      closeModal.addEventListener("click", closeEditModal);
      cancelBtn.addEventListener("click", closeEditModal);
      saveBtn.addEventListener("click", saveFile);
      
      // Close modal on outside click
      editModal.addEventListener("click", (e) => {
        if (e.target === editModal) closeEditModal();
      });

      async function logout() {
        await fetch("/api/logout", { method: "POST" }).catch(() => {});
        window.location.href = "/admin/login.html";
      }

      logoutBtn.addEventListener("click", logout);
      loadFiles();
    </script>
  </body>
</html>
