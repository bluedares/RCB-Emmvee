<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Winners | Admin</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .logo-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        margin-bottom: 20px;
      }
      .logo-container img {
        height: 60px;
        width: auto;
        object-fit: contain;
        transition: opacity 0.3s ease;
      }
      .logo-container img.loading {
        opacity: 0.3;
      }
      .logo-container img.loaded {
        opacity: 1;
      }
      .logo-container img.error {
        display: none;
      }
      @media (max-width: 600px) {
        .logo-container {
          gap: 16px;
        }
        .logo-container img {
          height: 50px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <img 
          id="emmveeLogo" 
          src="/logo/Emmvee-group-logo.jpg" 
          alt="Emmvee Logo" 
          class="loading"
        />
        <img 
          id="rcbLogo" 
          src="/logo/rcb_logo.jpg" 
          alt="RCB Logo" 
          class="loading"
        />
      </div>
      
      <div class="brand">
        <h1 id="title">Winners</h1>
        <div class="pill" id="pill">Loading…</div>
      </div>

      <div class="card">
        <div class="topbar">
          <a class="link" href="/admin/matches.html">← Back</a>
          <button class="btn secondary" id="logoutBtn">Logout</button>
        </div>

        <div>
          <a class="link" id="downloadLink" href="#">Download CSV (Excel)</a>
        </div>

        <table class="table">
          <thead>
            <tr>
              <th>Employee ID</th>
              <th>Tickets</th>
              <th>Picked at</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <div id="msg"></div>
      </div>
    </div>

    <script>
      // Handle logo loading
      const emmveeLogo = document.getElementById("emmveeLogo");
      const rcbLogo = document.getElementById("rcbLogo");
      
      [emmveeLogo, rcbLogo].forEach(logo => {
        if (logo) {
          logo.addEventListener("load", () => {
            logo.classList.remove("loading");
            logo.classList.add("loaded");
          });
          logo.addEventListener("error", () => {
            logo.classList.remove("loading");
            logo.classList.add("error");
          });
        }
      });

      const params = new URLSearchParams(window.location.search);
      const matchId = params.get("matchId");
      const titleEl = document.getElementById("title");
      const pillEl = document.getElementById("pill");
      const rowsEl = document.getElementById("rows");
      const msg = document.getElementById("msg");
      const downloadLink = document.getElementById("downloadLink");
      const logoutBtn = document.getElementById("logoutBtn");

      function setMsg(text, type) {
        msg.className = type || "";
        msg.textContent = text || "";
      }

      async function load() {
        if (!matchId) {
          setMsg("Missing matchId", "error");
          return;
        }
        downloadLink.href = `/api/admin/matches/${encodeURIComponent(matchId)}/winners/download`;

        const res = await fetch(`/api/admin/matches/${encodeURIComponent(matchId)}/winners`);
        if (res.status === 401) {
          window.location.href = "/admin/login.html";
          return;
        }
        const data = await res.json();
        if (!res.ok) {
          setMsg(data.error || "Failed to load winners", "error");
          titleEl.textContent = "Winners";
          pillEl.textContent = matchId;
          return;
        }

        titleEl.textContent = `Winners — ${data.match.title}`;
        pillEl.textContent = `${data.match.matchId} • ${data.match.venue}`;

        rowsEl.innerHTML = "";
        const winners = data.winners || [];
        for (const w of winners) {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${w.employeeId}</td><td>${w.ticketCount}</td><td>${w.pickedAt || ""}</td>`;
          rowsEl.appendChild(tr);
        }

        setMsg(winners.length ? "" : "No winners in this match yet.", winners.length ? "" : "hint");
      }

      async function logout() {
        await fetch("/api/logout", { method: "POST" }).catch(() => {});
        window.location.href = "/admin/login.html";
      }

      logoutBtn.addEventListener("click", logout);
      load().catch(() => setMsg("Failed to load winners page.", "error"));
    </script>
  </body>
</html>
